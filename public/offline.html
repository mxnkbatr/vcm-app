<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 24px; background: #F2F2F7; color: #111; }
      .card { max-width: 520px; margin: 12vh auto 0; background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { margin: 0; line-height: 1.45; opacity: .85; }
      button { margin-top: 14px; padding: 10px 14px; border: 0; border-radius: 12px; background: #111; color: #fff; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>Internet connection алга байна. Сүлжээ орж ирмэгц дахин оролдоорой.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
